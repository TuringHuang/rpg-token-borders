<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Outer HUD ring -->
  <circle cx="256" cy="256" r="246" stroke="#00ccff" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.4"/>
  <!-- Main ring -->
  <circle cx="256" cy="256" r="238" stroke="#00ccff" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="228" stroke="#00ccff" stroke-width="1" opacity="0.5"/>
  <!-- Tick marks — 36 evenly spaced, alternating long/short -->
  <g stroke="#00ccff" stroke-width="1.5" stroke-linecap="round">
    <g id="tk">
      <line x1="256" y1="4" x2="256" y2="18"/>
    </g>
    <g id="tks">
      <line x1="256" y1="8" x2="256" y2="15" opacity="0.5"/>
    </g>
    <!-- Long ticks every 30° -->
    <use href="#tk" transform="rotate(0 256 256)"/>
    <use href="#tk" transform="rotate(30 256 256)"/>
    <use href="#tk" transform="rotate(60 256 256)"/>
    <use href="#tk" transform="rotate(90 256 256)"/>
    <use href="#tk" transform="rotate(120 256 256)"/>
    <use href="#tk" transform="rotate(150 256 256)"/>
    <use href="#tk" transform="rotate(180 256 256)"/>
    <use href="#tk" transform="rotate(210 256 256)"/>
    <use href="#tk" transform="rotate(240 256 256)"/>
    <use href="#tk" transform="rotate(270 256 256)"/>
    <use href="#tk" transform="rotate(300 256 256)"/>
    <use href="#tk" transform="rotate(330 256 256)"/>
    <!-- Short ticks every 10° (between longs) -->
    <use href="#tks" transform="rotate(10 256 256)"/>
    <use href="#tks" transform="rotate(20 256 256)"/>
    <use href="#tks" transform="rotate(40 256 256)"/>
    <use href="#tks" transform="rotate(50 256 256)"/>
    <use href="#tks" transform="rotate(70 256 256)"/>
    <use href="#tks" transform="rotate(80 256 256)"/>
    <use href="#tks" transform="rotate(100 256 256)"/>
    <use href="#tks" transform="rotate(110 256 256)"/>
    <use href="#tks" transform="rotate(130 256 256)"/>
    <use href="#tks" transform="rotate(140 256 256)"/>
    <use href="#tks" transform="rotate(160 256 256)"/>
    <use href="#tks" transform="rotate(170 256 256)"/>
    <use href="#tks" transform="rotate(190 256 256)"/>
    <use href="#tks" transform="rotate(200 256 256)"/>
    <use href="#tks" transform="rotate(220 256 256)"/>
    <use href="#tks" transform="rotate(230 256 256)"/>
    <use href="#tks" transform="rotate(250 256 256)"/>
    <use href="#tks" transform="rotate(260 256 256)"/>
    <use href="#tks" transform="rotate(280 256 256)"/>
    <use href="#tks" transform="rotate(290 256 256)"/>
    <use href="#tks" transform="rotate(310 256 256)"/>
    <use href="#tks" transform="rotate(320 256 256)"/>
    <use href="#tks" transform="rotate(340 256 256)"/>
    <use href="#tks" transform="rotate(350 256 256)"/>
  </g>
  <!-- Corner brackets at 4 cardinals -->
  <g stroke="#00ccff" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <path d="M248 2 h16 M256 0 v6"/>
    <path d="M248 510 h16 M256 512 v-6"/>
    <path d="M2 248 v16 M0 256 h6"/>
    <path d="M510 248 v16 M512 256 h-6"/>
  </g>
</svg>
