<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="eg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8e6c0"/>
      <stop offset="100%" stop-color="#4a8a60"/>
    </linearGradient>
  </defs>
  <!-- Thin vine ring -->
  <circle cx="256" cy="256" r="238" stroke="url(#eg)" stroke-width="6"/>
  <circle cx="256" cy="256" r="232" stroke="#4a8a60" stroke-width="1.5" opacity="0.4"/>
  <circle cx="256" cy="256" r="246" stroke="#4a8a60" stroke-width="1" opacity="0.3"/>
  <!-- Leaf pairs — 12 positions -->
  <g fill="#7ec8a0" fill-opacity="0.25" stroke="#7ec8a0" stroke-width="1.5">
    <g id="lf">
      <!-- Left leaf -->
      <path d="M248 16 Q240 6 248 2 Q256 6 248 16z"/>
      <!-- Right leaf -->
      <path d="M264 16 Q272 6 264 2 Q256 6 264 16z"/>
      <!-- Stem dot -->
      <circle cx="256" cy="18" r="2" fill="#7ec8a0" fill-opacity="0.5"/>
    </g>
    <use href="#lf" transform="rotate(30 256 256)"/>
    <use href="#lf" transform="rotate(60 256 256)"/>
    <use href="#lf" transform="rotate(90 256 256)"/>
    <use href="#lf" transform="rotate(120 256 256)"/>
    <use href="#lf" transform="rotate(150 256 256)"/>
    <use href="#lf" transform="rotate(180 256 256)"/>
    <use href="#lf" transform="rotate(210 256 256)"/>
    <use href="#lf" transform="rotate(240 256 256)"/>
    <use href="#lf" transform="rotate(270 256 256)"/>
    <use href="#lf" transform="rotate(300 256 256)"/>
    <use href="#lf" transform="rotate(330 256 256)"/>
  </g>
  <!-- Delicate inner vine -->
  <circle cx="256" cy="256" r="226" stroke="#7ec8a0" stroke-width="1" stroke-dasharray="4 12" opacity="0.4"/>
</svg>
